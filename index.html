<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Produtos MJ Distribuidora</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --lilas: #9B59B6;
    --lilas-dark: #7D3C98;
    --lilas-light: #C39BD3;
    --lilas-bg: #F5EEF8;
    --lilas-soft: #EAD9F4;
    --white: #fff;
    --gray-light: #F8F6FA;
    --gray-mid: #ddd;
    --gray-text: #555;
    --dark: #2C1A3A;
    --green: #27AE60;
    --whatsapp: #25D366;
    --shadow: 0 4px 24px rgba(155,89,182,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--gray-light);
    color: var(--dark);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--lilas) 0%, var(--lilas-dark) 100%);
    padding: 32px 24px 28px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(125,60,152,0.35);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    color: #fff;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.18);
    line-height: 1.2;
  }
  header p.sub {
    color: var(--lilas-light);
    font-size: 0.9rem;
    margin-top: 4px;
    font-weight: 600;
  }
  .cart-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--lilas);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 24px;
    font-size: 1rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(155,89,182,0.45);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 200;
    transition: transform .2s, box-shadow .2s;
  }
  .cart-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(155,89,182,0.5); }
  .cart-badge {
    background: #fff;
    color: var(--lilas-dark);
    border-radius: 50%;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.82rem;
    font-weight: 800;
  }

  /* SEARCH & FILTERS */
  .controls {
    max-width: 1200px;
    margin: 24px auto 0;
    padding: 0 16px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1;
    min-width: 220px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 13px 18px 13px 46px;
    border-radius: 50px;
    border: 2px solid var(--lilas-soft);
    font-size: 0.97rem;
    font-family: 'Nunito', sans-serif;
    background: #fff;
    outline: none;
    transition: border .2s;
  }
  .search-wrap input:focus { border-color: var(--lilas); }
  .search-wrap .icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    color: var(--lilas);
  }
  .filter-select {
    padding: 13px 18px;
    border-radius: 50px;
    border: 2px solid var(--lilas-soft);
    font-size: 0.9rem;
    font-family: 'Nunito', sans-serif;
    background: #fff;
    cursor: pointer;
    outline: none;
    color: var(--dark);
    font-weight: 600;
  }
  .filter-select:focus { border-color: var(--lilas); }

  /* STATS BAR */
  .stats-bar {
    max-width: 1200px;
    margin: 10px auto 16px;
    padding: 0 16px;
    font-size: 0.85rem;
    color: var(--gray-text);
    font-weight: 600;
  }

  /* GRID */
  .grid {
    max-width: 1200px;
    margin: 0 auto 120px;
    padding: 0 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }

  /* CARD */
  .card {
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    transition: transform .2s, box-shadow .2s;
    border: 1.5px solid transparent;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 36px rgba(155,89,182,0.2);
    border-color: var(--lilas-soft);
  }
  .card-img {
    width: 100%;
    height: 170px;
    object-fit: cover;
    background: linear-gradient(135deg, var(--lilas-bg) 0%, var(--lilas-soft) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .card-img .placeholder-icon {
    font-size: 3rem;
    opacity: 0.35;
    color: var(--lilas);
  }
  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
  .card-img img.loaded { display: block; }
  .card-img .img-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .card-img .img-placeholder span {
    font-size: 0.7rem;
    color: var(--lilas);
    font-weight: 700;
    opacity: 0.6;
  }
  .marca-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: var(--lilas);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 800;
    padding: 3px 9px;
    border-radius: 50px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .card-body {
    padding: 14px 16px 16px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .card-title {
    font-size: 0.92rem;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.35;
    margin-bottom: 4px;
    flex: 1;
  }
  .card-refer {
    font-size: 0.78rem;
    color: var(--gray-text);
    margin-bottom: 12px;
    font-weight: 600;
  }
  .card-price {
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--lilas-dark);
    margin-bottom: 12px;
    font-family: 'Playfair Display', serif;
  }
  .card-price span {
    font-size: 0.8rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    color: var(--gray-text);
    margin-right: 2px;
  }
  .qty-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: auto;
  }
  .qty-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--lilas-soft);
    background: #fff;
    color: var(--lilas-dark);
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    line-height: 1;
  }
  .qty-btn:hover { background: var(--lilas); color: #fff; border-color: var(--lilas); }
  .qty-display {
    font-size: 1rem;
    font-weight: 800;
    color: var(--dark);
    min-width: 28px;
    text-align: center;
  }
  .add-btn {
    flex: 1;
    background: var(--lilas);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 9px 14px;
    font-size: 0.87rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .add-btn:hover { background: var(--lilas-dark); transform: scale(1.02); }
  .add-btn.in-cart { background: var(--green); }

  /* MODAL CART */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(44,26,58,0.6);
    z-index: 300;
    backdrop-filter: blur(3px);
    align-items: flex-end;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: #fff;
    width: 100%;
    max-width: 580px;
    max-height: 88vh;
    border-radius: 24px 24px 0 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1.5px solid var(--lilas-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--lilas-dark);
  }
  .close-btn {
    background: var(--lilas-bg);
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    font-size: 1.2rem;
    cursor: pointer;
    color: var(--lilas-dark);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-body {
    overflow-y: auto;
    flex: 1;
    padding: 16px 24px;
  }
  .empty-cart {
    text-align: center;
    padding: 40px 0;
    color: var(--gray-text);
  }
  .empty-cart .big { font-size: 3rem; margin-bottom: 8px; }
  .cart-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--gray-light);
  }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: 700; font-size: 0.9rem; }
  .cart-item-marca { font-size: 0.75rem; color: var(--gray-text); }
  .cart-item-price { font-size: 0.85rem; color: var(--lilas-dark); font-weight: 800; }
  .cart-item-qty {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .remove-btn {
    background: none;
    border: none;
    color: #e74c3c;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 4px;
  }
  .modal-footer {
    padding: 16px 24px 24px;
    border-top: 1.5px solid var(--lilas-soft);
  }
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .total-label { font-size: 1rem; font-weight: 700; color: var(--gray-text); }
  .total-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--lilas-dark);
  }
  .client-field {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 2px solid var(--lilas-soft);
    font-size: 0.95rem;
    font-family: 'Nunito', sans-serif;
    margin-bottom: 12px;
    outline: none;
    transition: border .2s;
  }
  .client-field:focus { border-color: var(--lilas); }
  .whatsapp-btn {
    width: 100%;
    background: var(--whatsapp);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 1.05rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background .15s, transform .1s;
    letter-spacing: 0.3px;
  }
  .whatsapp-btn:hover { background: #1ebe57; transform: scale(1.01); }
  .whatsapp-icon { font-size: 1.3rem; }

  /* Empty state */
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-text);
  }
  .no-results .big { font-size: 3rem; margin-bottom: 10px; }

  @media(max-width: 480px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .card-img { height: 130px; }
    .card-body { padding: 10px 12px 12px; }
    .cart-btn { bottom: 16px; right: 16px; padding: 12px 18px; }
  }
</style>
</head>

<header>
  <h1>🛍️ Catálogo de Produtos<br>MJ DISTRIBUIDORA</h1>
  <p class="sub">mjdistribuidoradf@gmail.com</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar produto, marca, referência..." oninput="filterProducts()">
  </div>

    <option value="">Todas as marcas</option>
  </select>
  <select class="filter-select" id="sortFilter" onchange="filterProducts()">
    <option value="az">A → Z</option>
    <option value="za">Z → A</option>
    <option value="menor">Menor preço</option>
    <option value="maior">Maior preço</option>
  </select>
</div>

<div class="stats-bar" id="statsBar">Carregando produtos...</div>

<div class="grid" id="productGrid"></div>

<button class="cart-btn" onclick="openCart()">
  🛒 Ver Carrinho
  <span class="cart-badge" id="cartBadge">0</span>
</button>

<!-- CART MODAL -->
<div class="overlay" id="overlay" onclick="closeOnBg(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>🛒 Meu Carrinho</h2>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>
    <div class="modal-body" id="cartBody">
      <div class="empty-cart"><div class="big">🛒</div><p>Seu carrinho está vazio</p></div>
    </div>
    <div class="modal-footer">
      <div class="total-row">
        <span class="total-label">Total do Pedido:</span>
        <span class="total-value" id="totalValue">R$ 0,00</span>
      </div>
      <input class="client-field" type="text" id="clientName" placeholder="Seu nome (opcional)">
      <button class="whatsapp-btn" onclick="sendWhatsApp()">
        <span class="whatsapp-icon">📲</span>
        Finalizar Pedido via WhatsApp
      </button>
    </div>
  </div>
</div>

let cart = {};
let filtered = [...PRODUCTS];

// Build marca filter
const marcas = [...new Set(PRODUCTS.map(p => p.Marca).filter(Boolean))].sort();
const sel = document.getElementById('marcaFilter');
marcas.forEach(m => {
  const opt = document.createElement('option');
  opt.value = m; opt.textContent = m;
  sel.appendChild(opt);
});

function formatPrice(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const marca = document.getElementById('marcaFilter').value;
  const sort = document.getElementById('sortFilter').value;

  filtered = PRODUCTS.filter(p => {
    const matchQ = !q || p.Descricao.toLowerCase().includes(q) || (p.Marca||'').toLowerCase().includes(q) || (p.Refer||'').toLowerCase().includes(q);
    const matchM = !marca || p.Marca === marca;
    return matchQ && matchM;
  });

  if (sort === 'az') filtered.sort((a,b) => a.Descricao.localeCompare(b.Descricao));
  else if (sort === 'za') filtered.sort((a,b) => b.Descricao.localeCompare(a.Descricao));
  else if (sort === 'menor') filtered.sort((a,b) => a.Preco - b.Preco);
  else if (sort === 'maior') filtered.sort((a,b) => b.Preco - a.Preco);

  renderGrid();
}

function getProductId(p) {
  return p.Descricao + '|' + (p.Marca||'') + '|' + (p.Refer||'');
}

function renderGrid() {
  const grid = document.getElementById('productGrid');
  document.getElementById('statsBar').textContent = `Exibindo ${filtered.length} de ${PRODUCTS.length} produtos`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results"><div class="big">🔍</div><p>Nenhum produto encontrado</p></div>';
    return;
  }

  grid.innerHTML = filtered.map((p, i) => {
    const id = getProductId(p);
    const qty = cart[id]?.qty || 0;
    const inCart = qty > 0;
    return `
    <div class="card" id="card-${i}">
      <div class="card-img">
        <div class="img-placeholder">
          <div class="placeholder-icon">📦</div>
          <span>Foto em breve</span>
        </div>
        ${p.Marca ? `<span class="marca-badge">${p.Marca}</span>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${p.Descricao}</div>
        <div class="card-refer">${p.Refer || p.Und || ''}</div>
        <div class="card-price"><span>R$</span>${Number(p.Preco).toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty('${encodeId(id)}', -1)">−</button>
          <span class="qty-display" id="qty-${encodeId(id)}">${qty}</span>
          <button class="qty-btn" onclick="changeQty('${encodeId(id)}', 1)">+</button>
          <button class="add-btn ${inCart ? 'in-cart' : ''}" id="addbtn-${encodeId(id)}" onclick="addToCart('${encodeId(id)}', '${escStr(p.Descricao)}', '${escStr(p.Marca||'')}', '${escStr(p.Refer||'')}', ${p.Preco})">
            ${inCart ? '✓ No Carrinho' : '+ Adicionar'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function encodeId(id) { return btoa(encodeURIComponent(id)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_'); }
const idMap = {};
function storeId(enc, orig) { idMap[enc] = orig; }

// Pre-store all ids
PRODUCTS.forEach(p => { const id = getProductId(p); const enc = encodeId(id); idMap[enc] = id; cart[id] = cart[id] || null; });

function decodeId(enc) { return idMap[enc] || decodeURIComponent(atob(enc.replace(/-/g,'+').replace(/_/g,'/'))); }

function escStr(s) { return s.replace(/'/g, "\'").replace(/"/g,'&quot;'); }

function addToCart(encId, name, marca, refer, price) {
  const id = decodeId(encId);
  if (!cart[id] || cart[id].qty === 0) {
    cart[id] = {name, marca, refer, price, qty: 1};
  }
  updateCartUI();
  // Update button
  const btn = document.getElementById('addbtn-' + encId);
  if (btn) { btn.textContent = '✓ No Carrinho'; btn.classList.add('in-cart'); }
  const qtyEl = document.getElementById('qty-' + encId);
  if (qtyEl) qtyEl.textContent = cart[id].qty;
}

function changeQty(encId, delta) {
  const id = decodeId(encId);
  if (!cart[id]) return;
  cart[id].qty = Math.max(0, (cart[id].qty || 0) + delta);
  if (cart[id].qty === 0) { cart[id] = null; }
  updateCartUI();
  const qtyEl = document.getElementById('qty-' + encId);
  if (qtyEl) qtyEl.textContent = cart[id]?.qty || 0;
  const btn = document.getElementById('addbtn-' + encId);
  if (btn) {
    const inCart = cart[id]?.qty > 0;
    btn.textContent = inCart ? '✓ No Carrinho' : '+ Adicionar';
    btn.classList.toggle('in-cart', inCart);
  }
}

function updateCartUI() {
  const items = Object.values(cart).filter(Boolean);
  const totalQty = items.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cartBadge').textContent = totalQty;
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('totalValue').textContent = formatPrice(total);
  renderCartBody(items);
}

function renderCartBody(items) {
  const body = document.getElementById('cartBody');
  if (!items.length) {
    body.innerHTML = '<div class="empty-cart"><div class="big">🛒</div><p>Seu carrinho está vazio</p></div>';
    return;
  }
  body.innerHTML = items.map(item => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-marca">${item.marca} ${item.refer ? '· ' + item.refer : ''}</div>
        <div class="cart-item-price">${formatPrice(item.price)} × ${item.qty} = ${formatPrice(item.price * item.qty)}</div>
      </div>
      <div class="cart-item-qty">
        <button class="qty-btn" style="width:28px;height:28px;font-size:1rem" onclick="cartChangeQty('${encodeId(getProductId(item))}', -1)">−</button>
        <span style="font-weight:800;min-width:22px;text-align:center">${item.qty}</span>
        <button class="qty-btn" style="width:28px;height:28px;font-size:1rem" onclick="cartChangeQty('${encodeId(getProductId(item))}', 1)">+</button>
      </div>
    </div>
  `).join('');
}

// helper to get product key from cart item
function getProductId2(item) { return item.name + '|' + item.marca + '|' + item.refer; }
function getProductId(p) { return p.Descricao + '|' + (p.Marca||'') + '|' + (p.Refer||''); }

function cartChangeQty(encId, delta) {
  changeQty(encId, delta);
  const items = Object.values(cart).filter(Boolean);
  renderCartBody(items);
}

function openCart() { document.getElementById('overlay').classList.add('open'); updateCartUI(); }
function closeCart() { document.getElementById('overlay').classList.remove('open'); }
function closeOnBg(e) { if (e.target === document.getElementById('overlay')) closeCart(); }

function sendWhatsApp() {
  const items = Object.values(cart).filter(Boolean);
  if (!items.length) { alert('Adicione produtos ao carrinho antes de finalizar!'); return; }
  const name = document.getElementById('clientName').value.trim();
  const total = items.reduce((s,i) => s + i.price*i.qty, 0);
  let msg = '🛍️ *PEDIDO - MJ DISTRIBUIDORA*\n\n';
  if (name) msg += `👤 Cliente: *${name}*\n\n`;
  msg += '*Itens do pedido:*\n';
  items.forEach(i => {
    msg += `• ${i.qty}x ${i.name} (${i.marca}) - ${formatPrice(i.price * i.qty)}\n`;
  });
  msg += `\n💰 *Total: ${formatPrice(total)}*`;
  const encoded = encodeURIComponent(msg);
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encoded}`, '_blank');
}

// Initial render (sorted A-Z)
filterProducts();
</script>
